<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700;900&display=swap');
  :root { --black:#1a1a1a; --white:#f0ede8; --grey:#9a9fa8; --terra:#c47a3a; --red:#d42020; --dark:#3a3f44; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--black); display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; font-family:'Noto Sans JP',sans-serif; overflow:hidden; touch-action:none; }
  #hud { display:flex; gap:20px; margin-bottom:6px; align-items:center; }
  #hud span { font-size:.9rem; color:var(--grey); font-weight:700; letter-spacing:2px; }
  #sl { color:var(--terra)!important; }
  #soundBtn { background:none; border:1.5px solid var(--grey); color:var(--grey); font-size:.8rem; padding:2px 8px; border-radius:12px; cursor:pointer; letter-spacing:1px; user-select:none; -webkit-user-select:none; }
  #soundBtn:active { opacity:.6; }
  #gameCanvas { border:3px solid var(--dark); border-radius:8px; box-shadow:0 8px 40px rgba(0,0,0,.7); display:block; max-width:100vw; }
  #info { margin-top:7px; font-size:.72rem; color:var(--grey); opacity:.55; letter-spacing:1px; }
  #tc { display:flex; gap:18px; margin-top:12px; align-items:center; }
  .tb { background:var(--dark); border:2px solid var(--grey); color:var(--white); font-size:1.3rem; width:62px; height:62px; border-radius:50%; box-shadow:0 4px 0 #000; cursor:pointer; user-select:none; -webkit-user-select:none; touch-action:manipulation; display:flex; align-items:center; justify-content:center; }
  .tb:active { transform:translateY(3px); box-shadow:0 1px 0 #000; background:var(--terra); }
  #bj { background:var(--red); border-color:#ff5555; box-shadow:0 4px 0 #7a0000; width:70px; height:70px; font-size:1.4rem; }
  #bj:active { background:#ff3333; box-shadow:0 1px 0 #7a0000; }
</style>
</head>
<body>
<div id="hud">
  <span>SCORE <b id="sc">0</b></span>
  <span id="sl">STAGE <b id="st">1</b></span>
  <span>BEST <b id="hi">0</b></span>
  <button id="soundBtn" onclick="toggleSound()">🔊 ON</button>
</div>
<canvas id="gameCanvas" width="600" height="320"></canvas>
<div id="resultBtns" style="display:none;position:absolute;z-index:100;left:0;right:0;pointer-events:none;">
  <button id="btnRestart" style="pointer-events:auto;background:rgba(255,255,255,0.10);border:1.5px solid #777;color:#fff;font-family:'Noto Sans JP',sans-serif;font-size:0.78rem;font-weight:bold;border-radius:25px;cursor:pointer;touch-action:manipulation;">めげずにリスタート</button>
  <button id="btnPost" style="pointer-events:auto;background:rgba(0,0,0,0.85);border:1.5px solid #666;color:#fff;font-family:'Noto Sans JP',sans-serif;font-size:0.78rem;font-weight:bold;border-radius:25px;cursor:pointer;touch-action:manipulation;">🐦 ポストする</button>
</div>
<div id="info">← → 移動　▲ ジャンプ　🌱 豆苗を投げる</div>
<div id="tc">
  <button class="tb" id="bl">◀</button>
  <button class="tb" id="bj">▲</button>
  <button class="tb" id="br">▶</button>
  <button class="tb" id="bth" style="background:#2a6820;border-color:#5ab040;font-size:1rem;">🌱</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const GY = H - 44;

// ===== リザルトボタン（HTML） =====
const resultBtns = document.getElementById('resultBtns');
const btnRestart  = document.getElementById('btnRestart');
const btnPost     = document.getElementById('btnPost');

function positionResultBtns(){
  const rect = canvas.getBoundingClientRect();
  const scaleY = rect.height / H;
  const btnY = 20 + 220; // top+220
  const btnH = 50;
  const btnW = 230;
  const gap  = 20;
  const leftX  = W/2 - btnW - gap/2;
  const rightX = W/2 + gap/2;
  const scaleX = rect.width / W;

  resultBtns.style.top  = (rect.top + window.scrollY) + 'px';
  resultBtns.style.left = rect.left + 'px';
  resultBtns.style.width = rect.width + 'px';
  resultBtns.style.height = rect.height + 'px';
  resultBtns.style.position = 'fixed';

  const bh = btnH * scaleY;
  const bw = btnW * scaleX;

  btnRestart.style.position  = 'absolute';
  btnRestart.style.left  = (leftX * scaleX) + 'px';
  btnRestart.style.top   = (btnY * scaleY) + 'px';
  btnRestart.style.width = bw + 'px';
  btnRestart.style.height= bh + 'px';
  btnRestart.style.fontSize = (bh * 0.32) + 'px';

  btnPost.style.position  = 'absolute';
  btnPost.style.left  = (rightX * scaleX) + 'px';
  btnPost.style.top   = (btnY * scaleY) + 'px';
  btnPost.style.width = bw + 'px';
  btnPost.style.height= bh + 'px';
  btnPost.style.fontSize = (bh * 0.32) + 'px';
}

function showResultBtns(isClr){
  btnRestart.textContent = isClr ? 'もう一度' : 'めげずにリスタート';
  positionResultBtns();
  resultBtns.style.display = 'block';
}
function hideResultBtns(){
  resultBtns.style.display = 'none';
}

btnRestart.addEventListener('touchstart', e=>{e.preventDefault(); e.stopPropagation(); hideResultBtns(); startGame();},{passive:false});
btnRestart.addEventListener('click', ()=>{hideResultBtns(); startGame();});
btnPost.addEventListener('touchstart', e=>{e.preventDefault(); e.stopPropagation(); openXShare();},{passive:false});
btnPost.addEventListener('click', ()=>openXShare());

// ===== ゲーム状態 =====
let state='start', score=0, hiScore=0, frame=0, stage=1, worldX=0, scoreBase=0, bestX=0, startTime=0, clearTime=0;
let particles=[], mamekusas=[], playerShots=[], boss=null;
const bird = { x:80, y:0, w:40, h:48, vx:0, vy:0, onGround:false, jumpsLeft:2, facingRight:true };
let platforms=[], enemies=[], floats=[];

// ===== 音楽エンジン =====
let audioCtx=null, currentTrack=0, musicTimeoutId=null, masterNode=null;
let soundOn=true;

function toggleSound(){
  soundOn=!soundOn;
  if(masterNode) masterNode.gain.value=soundOn?0.85:0;
  const btn=document.getElementById('soundBtn');
  btn.textContent=soundOn?'🔊 ON':'🔇 OFF';
  btn.style.color=soundOn?'':'#d42020';
  btn.style.borderColor=soundOn?'':'#d42020';
}

function getAudio(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}
function stopMusic(){
  currentTrack=0;
  if(musicTimeoutId){clearTimeout(musicTimeoutId);musicTimeoutId=null;}
  if(masterNode){
    try{
      masterNode.gain.setValueAtTime(0, masterNode.context.currentTime);
      masterNode.disconnect();
    }catch(e){}
    masterNode=null;
  }
}

function scheduleLoop(s, ac, master){
  if(currentTrack!==s) return;

  const mel1=[523,659,784,659,523,659,784,880,784,659,523,440,523,659,784,659,
              523,784,1047,784,659,523,659,784,880,784,659,523,440,523,659,523];
  const mel2=[587,554,523,494,523,554,587,622,587,554,523,466,494,523,554,587,
              622,659,622,587,659,698,659,622,587,622,659,622,587,554,523,494];
  const mel3=[440,392,349,330,349,392,440,466,440,392,349,330,392,440,392,349,
              523,494,440,392,349,392,440,494,523,494,440,392,440,392,349,330];
  const bas1=[131,165,131,196,131,165,196,131,131,165,131,165,131,131,165,131];
  const bas2=[73,73,78,73,73,78,82,73,73,73,69,73,78,73,73,73];
  const bas3=[110,110,87,98,87,110,110,87,110,110,87,98,87,110,87,87];
  const bpm=s===1?130:s===2?142:66;
  const mel=s===1?mel1:s===2?mel2:mel3;
  const bas=s===1?bas1:s===2?bas2:bas3;
  const b=60/bpm;
  const now=ac.currentTime+0.05;

  function n(freq,startT,durT,vol,type,dest){
    if(freq<=0||currentTrack!==s) return;
    const o=ac.createOscillator();
    const g=ac.createGain();
    o.type=type; o.frequency.value=freq;
    o.connect(g); g.connect(dest);
    g.gain.setValueAtTime(0.0001,startT);
    g.gain.linearRampToValueAtTime(vol,startT+0.02);
    g.gain.setValueAtTime(vol,startT+durT*0.75);
    g.gain.exponentialRampToValueAtTime(0.0001,startT+durT);
    o.start(startT); o.stop(startT+durT+0.05);
    o.onended=()=>{ try{o.disconnect();g.disconnect();}catch(e){} };
  }

  let t=0;
  if(s===1){
    mel.forEach((f)=>{ n(f,now+t,b*0.88,0.18,'square',master); t+=b; });
    bas1.forEach((f,i)=>n(f,now+i*b*2,b*1.8,0.10,'triangle',master));
  } else if(s===2){
    mel.forEach((f)=>{ n(f,now+t,b*0.82,0.15,'sawtooth',master); t+=b; });
    bas2.forEach((f,i)=>n(f,now+i*b*2,b*1.8,0.11,'sawtooth',master));
    for(let i=0;i<8;i++){
      const st=now+(i*2+1)*b;
      const buf=ac.createBuffer(1,Math.floor(ac.sampleRate*0.05),ac.sampleRate);
      const d=buf.getChannelData(0);
      for(let j=0;j<d.length;j++) d[j]=(Math.random()*2-1);
      const src=ac.createBufferSource(); src.buffer=buf;
      const g=ac.createGain();
      g.gain.setValueAtTime(0.06,st);
      g.gain.exponentialRampToValueAtTime(0.0001,st+0.04);
      src.connect(g); g.connect(master);
      src.start(st); src.stop(st+0.06);
      src.onended=()=>{ try{src.disconnect();g.disconnect();}catch(e){} };
    }
  } else {
    mel.forEach((f)=>{ n(f,now+t,b*2*0.9,0.22,'sine',master); t+=b*2; });
    bas3.forEach((f,i)=>{ n(f,now+i*b*4,b*3.8,0.18,'triangle',master); n(f/2,now+i*b*4,b*3.8,0.12,'sine',master); });
    for(let i=0;i<16;i++) n(55,now+i*b*2,b*0.5,0.18,'sine',master);
  }

  const loopDur = s===3 ? mel.length*b*2 : mel.length*b;
  musicTimeoutId=setTimeout(()=>scheduleLoop(s,ac,master),(loopDur-0.15)*1000);
}

function playMusic(s){
  stopMusic();
  if(s<1||s>3||!audioCtx) return;
  try{
    const ac=audioCtx;
    currentTrack=s;
    const master=ac.createGain();
    master.gain.value=soundOn?0.85:0;
    master.connect(ac.destination);
    masterNode=master;
    // 常にresumeを待ってから開始（suspendedでなくても安全）
    const start=()=>{ if(currentTrack===s) scheduleLoop(s,ac,master); };
    if(ac.state!=='running'){
      ac.resume().then(start).catch(start);
    } else {
      start();
    }
  }catch(err){console.warn('music:',err);}
}
function resumeAudio(){
  if(audioCtx&&audioCtx.state==='suspended') audioCtx.resume();
}

// ===== 地形・敵生成 =====
function stageLen(){ return stage===3 ? 3600 : 2000+stage*400; }

function buildStage(){
  const LEN = stageLen();
  platforms = [{x:0,y:GY,w:LEN+800,h:44}];

  if(stage===1){
    // シンプル・広め・低め
    [ [220,60,100],[400,110,80],[580,70,95],[760,120,75],
      [940,80,100],[1120,140,70],[1320,90,90],[1520,65,100],
      [1720,130,75],[1900,85,90],[2100,110,70]
    ].forEach(([x,dy,w])=>platforms.push({x,y:GY-dy,w,h:13}));

  } else if(stage===2){
    // 段差多め・ジャンプ必須・空白あり
    [ [200,75,65],[330,155,55],[465,80,70],[600,165,50],[735,95,65],
      [870,170,52],[1010,80,80],[1170,155,58],[1310,95,68],
      [1460,170,52],[1610,110,62],[1760,165,52],[1910,80,72],
      [2070,150,58],[2220,100,65],[2390,180,75],[2570,140,65],[2740,180,75]
    ].forEach(([x,dy,w])=>platforms.push({x,y:GY-dy,w,h:13}));

  } else {
    // ステージ3：難しい地形 + ボスアリーナ
    [ [200,85,58],[315,165,48],[440,95,62],[570,175,46],[695,90,58],
      [825,168,48],[950,118,62],[1100,178,46],[1220,95,58],
      [1360,168,48],[1490,128,68],[1650,178,46],[1780,95,58],
      [1920,162,50],[2060,88,62],[2210,162,52],[2360,98,58],
      // ボス手前ジャンプ台
      [2550,130,72],[2760,90,68],
      // ボスアリーナ（広い平台）
      [2960,8,580],
      // ボスを踏むための段差（短め）
      [3020,90,45],[3160,140,45],[3300,90,45],
    ].forEach(([x,dy,w])=>platforms.push({x,y:GY-dy,w,h:13}));
  }

  // 敵配置（後半集中）
  enemies=[];
  const sp=1.0+(stage-1)*0.42;

  if(stage===1){
    const z=LEN*0.48;
    for(let i=0;i<3;i++) enemies.push({x:z+180+i*360+rnd(70), y:GY-32, w:44,h:32, vx:(sp*(0.8+rnd01()*0.4)), alive:true, type:'cat', t:rnd01()*100, hp:2});
    enemies.push({x:z+460+rnd(100), y:GY-28, w:120,h:28, vx:-(sp*0.65), alive:true, type:'snake', t:rnd01()*100, hp:3});
    // カラス（ステージ1：2体）
    for(let i=0;i<2;i++) enemies.push({x:z+300+i*500+rnd(100), y:GY-120, w:36,h:32, vx:(sp*(1.0+rnd01()*0.3)), alive:true, type:'crow', t:rnd01()*60, hp:2, baseY:GY-110-rnd(50), diveMode:false, diveTimer:0});
  } else if(stage===2){
    const z=LEN*0.40;
    for(let i=0;i<5;i++) enemies.push({x:z+140+i*310+rnd(60), y:GY-32, w:44,h:32, vx:(sp*(0.8+rnd01()*0.5)), alive:true, type:'cat', t:rnd01()*100, hp:2});
    for(let i=0;i<3;i++) enemies.push({x:z+260+i*400+rnd(60), y:GY-28, w:120,h:28, vx:-(sp*(0.65+rnd01()*0.3)), alive:true, type:'snake', t:rnd01()*100, hp:3});
    // カラス（ステージ2：4体）
    for(let i=0;i<4;i++) enemies.push({x:z+200+i*380+rnd(80), y:GY-130, w:36,h:32, vx:(sp*(1.1+rnd01()*0.4)), alive:true, type:'crow', t:rnd01()*60, hp:2, baseY:GY-120-rnd(60), diveMode:false, diveTimer:0});
  } else {
    const z=LEN*0.30;
    for(let i=0;i<7;i++) enemies.push({x:z+100+i*230+rnd(50), y:GY-32, w:44,h:32, vx:(sp*(0.9+rnd01()*0.5)), alive:true, type:'cat', t:rnd01()*100, hp:2});
    for(let i=0;i<4;i++) enemies.push({x:z+170+i*310+rnd(50), y:GY-28, w:120,h:28, vx:-(sp*(0.7+rnd01()*0.3)), alive:true, type:'snake', t:rnd01()*100, hp:3});
    // カラス（ステージ3：6体、速い）
    for(let i=0;i<6;i++) enemies.push({x:z+150+i*280+rnd(60), y:GY-140, w:36,h:32, vx:(sp*(1.3+rnd01()*0.5)), alive:true, type:'crow', t:rnd01()*60, hp:2, baseY:GY-130-rnd(70), diveMode:false, diveTimer:0});
    // 金カラス（ステージ3：1体・追跡型）
    enemies.push({x:2200+rnd(200), y:GY-150, w:36,h:32, vx:1.8, vy:0, alive:true, type:'crow', t:0, hp:3, baseY:GY-140, gold:true, diveMode:false, diveTimer:0});
    // 金色の特別敵（速い・ボスアリーナ手前）
    enemies.push({x:2400+rnd(100), y:GY-32, w:44,h:32, vx:(sp*2.4), alive:true, type:'cat', t:0, hp:2, gold:true});
    enemies.push({x:2600+rnd(100), y:GY-28, w:120,h:28, vx:-(sp*2.0), alive:true, type:'snake', t:0, hp:3, gold:true});
    boss={x:3060,y:GY-130,w:120,h:120,hp:8,maxHp:8,alive:true,t:0,vx:1.2,throwTimer:0,hitFlash:0,attackCount:0,downTimer:0};
  }

  floats=[];
  for(let i=0;i<22;i++) floats.push({x:rnd01()*LEN,y:rnd01()*H,r:rnd01()*4+2,vy:rnd01()*0.4+0.15,vx:-0.18,alpha:rnd01()*0.35+0.15});
}

function rnd(n){ return Math.random()*n; }
function rnd01(){ return Math.random(); }

// ===== 入力 =====
const keys={};
let chargeStart=0, charging=false;
let throwCooldown=0;
const MAX_CHARGE=45;

function resetGame(){
  score=0;frame=0;worldX=0;stage=1;scoreBase=0;bestX=0;startTime=Date.now();clearTime=0;particles=[];mamekusas=[];playerShots=[];boss=null;
  Object.keys(keys).forEach(k=>keys[k]=false);
  charging=false; chargeStart=0; throwCooldown=0;
  Object.assign(bird,{x:80,y:GY-bird.h,vx:0,vy:0,onGround:false,jumpsLeft:2,facingRight:true});
  buildStage();hud();
}
function hud(){
  document.getElementById('sc').textContent=score;
  document.getElementById('hi').textContent=hiScore;
  document.getElementById('st').textContent=stage;
}

function startCharge(){
  if(state!=='play'||throwCooldown>0) return;
  if(!charging){ charging=true; chargeStart=frame; }
}
function releaseThrow(){
  if(!charging) return;
  charging=false;
  if(state!=='play'||throwCooldown>0) return;
  const held=Math.min(frame-chargeStart, MAX_CHARGE);
  const power=held/MAX_CHARGE;
  throwCooldown=28;
  const dir=bird.facingRight?1:-1;
  const spd=6+power*10;
  const vy=-1.5-power*4;
  playerShots.push({x:bird.x+(bird.facingRight?bird.w:0),y:bird.y+bird.h*0.4,vx:dir*spd,vy,alive:true,t:0});
  for(let i=0;i<5;i++) particles.push({x:bird.x+bird.w/2,y:bird.y+bird.h*0.4,vx:dir*(4+rnd(3)),vy:(rnd01()-.5)*3,life:14,max:14,c:'#5ab040'});
}

document.addEventListener('keydown',e=>{
  if(!keys[e.code]){keys[e.code]=true;
    if(e.code==='Space'||e.code==='ArrowUp'){
      if(state==='start'||state==='dead'||state==='clear'){startGame();return;}
      doJump();
    }
    if(e.code==='KeyZ'||e.code==='KeyX') startCharge();
  }
});
document.addEventListener('keyup',e=>{
  if(e.code==='KeyZ'||e.code==='KeyX') releaseThrow();
  keys[e.code]=false;
});
function bindBtn(id,code){
  const b=document.getElementById(id);
  const dn=()=>{if(!keys[code]){keys[code]=true;if(code==='Space'){if(state==='start'||state==='dead'||state==='clear'){startGame();return;}doJump();}}};
  const up=()=>{keys[code]=false;};
  b.addEventListener('touchstart',e=>{e.preventDefault();dn();},{passive:false});
  b.addEventListener('touchend',e=>{e.preventDefault();up();},{passive:false});
  b.addEventListener('touchcancel',e=>{e.preventDefault();up();},{passive:false});
  b.addEventListener('mousedown',dn);b.addEventListener('mouseup',up);b.addEventListener('mouseleave',up);
}
bindBtn('bl','ArrowLeft');bindBtn('br','ArrowRight');bindBtn('bj','Space');
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(state==='start'||state==='dead'||state==='clear'){
    const rect=canvas.getBoundingClientRect();
    const scaleX=canvas.width/rect.width;
    const scaleY=canvas.height/rect.height;
    const tx=(e.touches[0].clientX-rect.left)*scaleX;
    const ty=(e.touches[0].clientY-rect.top)*scaleY;
    if(state==='dead'||state==='clear'){
      hideResultBtns(); startGame(); return;
    }
    startGame();
  }
},{passive:false});
// 投げるボタン（溜め対応）
const bthEl=document.getElementById('bth');
bthEl.addEventListener('touchstart',e=>{e.preventDefault();startCharge();},{passive:false});
bthEl.addEventListener('touchend',e=>{e.preventDefault();releaseThrow();},{passive:false});
bthEl.addEventListener('touchcancel',e=>{e.preventDefault();releaseThrow();},{passive:false});
bthEl.addEventListener('mousedown',()=>startCharge());
bthEl.addEventListener('mouseup',()=>releaseThrow());
bthEl.addEventListener('mouseleave',()=>releaseThrow());

function doJump(){
  if(state!=='play')return;
  if(bird.jumpsLeft>0){
    bird.vy=bird.jumpsLeft===2?-11.5:-9.5;
    bird.jumpsLeft--;bird.onGround=false;
    const col=bird.jumpsLeft===0?'#88ccff':'#f5f3ee';
    for(let i=0;i<6;i++) particles.push({x:bird.x+bird.w/2,y:bird.y+bird.h,vx:(rnd01()-.5)*3.5,vy:rnd01()*-2.5,life:20,max:20,c:col});
  }
}

function startGame(){
  // AudioContextをユーザー操作の中で直接作成・unlock
  if(!audioCtx){
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  }
  // resumeを確実に待ってから音楽開始
  const doStart=()=>{ resetGame(); state='play'; playMusic(1); };
  if(audioCtx.state!=='running'){
    audioCtx.resume().then(doStart).catch(doStart);
  } else {
    doStart();
  }
}
function aabb(ax,ay,aw,ah,bx,by,bw,bh){return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;}

// ===== 更新 =====
function update(){
  if(state!=='play')return;
  frame++;
  const SPD=3.8+(stage-1)*0.3;
  if(keys['ArrowLeft'])     {bird.vx=-SPD;bird.facingRight=false;}
  else if(keys['ArrowRight']){bird.vx=SPD;bird.facingRight=true;}
  else bird.vx*=0.72;
  bird.vy+=0.56;bird.x+=bird.vx;bird.y+=bird.vy;bird.onGround=false;
  for(const p of platforms){
    if(aabb(bird.x,bird.y,bird.w,bird.h,p.x,p.y,p.w,p.h)){
      if(bird.vy>=0&&bird.y+bird.h-bird.vy<=p.y+6){
        bird.y=p.y-bird.h;bird.vy=0;bird.onGround=true;bird.jumpsLeft=2;
      }
    }
  }
  if(bird.y>H+80){die();return;}
  if(bird.x<0) bird.x=0; // 左端の壁
  worldX=Math.max(0,Math.min(bird.x-150, stageLen()-W));
  // 歩行スコア：最大到達地点を記録して安定加算
  if(bird.x > bestX) bestX = bird.x;
  const walkScore = Math.floor((bestX - 80) / 17);
  const newScore = scoreBase + walkScore;
  if(newScore > score) score = newScore;
  if(score>hiScore)hiScore=score;
  hud();

  // ステージ進行
  if(stage<3&&bird.x>stageLen()){
    stage++;
    scoreBase=score; bestX=80; // bestX=80でwalkScore=0からスタート
    Object.assign(bird,{x:80,y:GY-bird.h,vx:0,vy:0,onGround:false,jumpsLeft:2});
    worldX=0;mamekusas=[];playerShots=[];buildStage();hud();playMusic(stage);
    for(let i=0;i<20;i++) particles.push({x:rnd01()*W,y:rnd01()*H,vx:(rnd01()-.5)*5,vy:rnd01()*-4-1,life:35,max:35,c:['#f5f3ee','#c47a3a','#d42020'][i%3]});
    return;
  }

  // 通常敵
  let hitByEnemy=false;
  for(const e of enemies){
    if(!e.alive)continue;
    e.t++;
    const onScreen = e.x+e.w > worldX-20 && e.x < worldX+W+20;

    if(e.type==='crow'){
      const isGold=e.gold||false;
      if(isGold){
        // 金カラス：プレイヤーをしつこく追跡（なめらか）
        const dx=bird.x-e.x;
        const dy=bird.y-e.y;
        const dist=Math.sqrt(dx*dx+dy*dy)||1;
        const spd=2.2;
        const txvx=(dx/dist)*spd;
        const txvy=(dy/dist)*spd;
        e.vx=e.vx*0.94+txvx*0.06;
        e.vy=(e.vy||0)*0.94+txvy*0.06;
        e.x+=e.vx;
        e.y+=e.vy;
        e.facingLeft=e.vx<0;
      } else {
        // 通常カラス：ゆったりサイン波で上下（速度ベースで滑らか）
        e.x+=e.vx;
        if(e.x<40){e.vx=Math.abs(e.vx);}
        if(e.x>stageLen()-80){e.vx=-Math.abs(e.vx);}
        e.facingLeft=e.vx<0;
        const targetY=e.baseY+Math.sin(e.t*0.022)*18;
        e.y=e.y*0.92+targetY*0.08;
        const distX=Math.abs(e.x-bird.x);
        if(!e.diveMode){
          if(distX<120&&e.y<bird.y-20){ e.diveMode=true; e.diveTimer=0; }
        } else {
          e.y+=2.0; e.diveTimer++;
          if(e.y>e.baseY+20||e.diveTimer>25){ e.diveMode=false; e.diveTimer=0; }
        }
      }
      // 当たり判定（画面内のみ）
      if(onScreen&&aabb(bird.x+4,bird.y+4,bird.w-8,bird.h-8,e.x,e.y,e.w,e.h)){
        const stompY = bird.y+bird.h < e.y+e.h*0.6;
        if(stompY){
          e.alive=false;bird.vy=-10;bird.jumpsLeft=2;scoreBase+=isGold?70:30;
          for(let i=0;i<10;i++) particles.push({x:e.x+e.w/2,y:e.y,vx:(rnd01()-.5)*6,vy:rnd01()*-5-1,life:28,max:28,c:isGold?'#f0d000':'#2a2a3a'});
        } else { hitByEnemy=true; }
      }
    } else {
      e.x+=e.vx;
      if(e.x<40)e.vx=Math.abs(e.vx);
      if(e.x>stageLen()-80)e.vx=-Math.abs(e.vx);
      // ヘビは中央寄り(左右20px除いた範囲)だけ踏める
      const sx = e.type==='snake' ? e.x+20 : e.x;
      const sw = e.type==='snake' ? e.w-40 : e.w;
      if(onScreen&&aabb(bird.x+4,bird.y+4,bird.w-8,bird.h-8,sx,e.y,sw,e.h)){
        const stompY = bird.y+bird.h < e.y+e.h*0.6;
        if(stompY){
          e.alive=false;bird.vy=-8;bird.jumpsLeft=2;
          const pts=e.type==='snake'?(e.gold?50:30):( e.gold?30:20);
          scoreBase+=pts;
          const ec=e.type==='snake'?'#4aa030':'#9090a8';
          for(let i=0;i<10;i++) particles.push({x:e.x+e.w/2,y:e.y,vx:(rnd01()-.5)*5,vy:rnd01()*-4-1,life:28,max:28,c:e.gold?'#f0d000':ec});
        } else if(aabb(bird.x+4,bird.y+4,bird.w-8,bird.h-8,e.x,e.y,e.w,e.h)){
          hitByEnemy=true;
        }
      }
    }
  }
  if(hitByEnemy){die();return;}
  // 通常敵×豆苗ヒット（猫2回・蛇3回）
  for(const s of playerShots){
    if(!s.alive)continue;
    for(const e of enemies){
      if(!e.alive)continue;
      const eOnScreen = e.x+e.w > worldX-20 && e.x < worldX+W+20;
      if(!eOnScreen)continue;
      if(aabb(s.x-8,s.y-8,16,16,e.x,e.y,e.w,e.h)){
        s.alive=false;
        e.hp--;
        e.hitFlash=12;
        scoreBase+=5;
        const ec=e.type==='snake'?'#4aa030':'#9090a8';
        for(let k=0;k<7;k++) particles.push({x:s.x,y:s.y,vx:(rnd01()-.5)*5,vy:rnd01()*-4-1,life:20,max:20,c:ec});
        if(e.hp<=0){
          e.alive=false;
          scoreBase+=5;
          const ec=e.type==='snake'?'#4aa030':e.type==='crow'?'#2a2a3a':'#9090a8';
          for(let k=0;k<10;k++) particles.push({x:e.x+e.w/2,y:e.y,vx:(rnd01()-.5)*6,vy:rnd01()*-5-1,life:28,max:28,c:ec});
        }
        break;
      }
    }
  }

  // ボス
  if(boss&&boss.alive){
    boss.t++;
    boss.hitFlash=Math.max(0,boss.hitFlash-1);

    // ダウン（ねむり）状態
    if(boss.downTimer>0){
      boss.downTimer--;
      // ダウン終了時にvx復元
      if(boss.downTimer===0) boss.vx = boss.x > 3170 ? -1.2 : 1.2;
    } else {
      boss.x+=boss.vx;
      if(boss.x<2960)boss.vx=Math.abs(boss.vx);
      if(boss.x>3380)boss.vx=-Math.abs(boss.vx);
      boss.throwTimer++;
      const interval=Math.max(50,105-boss.hp*7);
      if(boss.throwTimer>interval){
        boss.throwTimer=0;
        boss.attackCount=(boss.attackCount||0)+1;
        const dir=boss.x>bird.x?-1:1;
        const bx=boss.x+boss.w/2, by=boss.y+45;
        if(boss.hp<=4){
          mamekusas.push({x:bx,y:by,vx:dir*(3.5+rnd(1.5)),vy:-5-rnd(2),alive:true,t:0});
          mamekusas.push({x:bx,y:by,vx:dir*(2.5+rnd(1)),vy:-2,alive:true,t:0});
          mamekusas.push({x:bx,y:by,vx:dir*(4+rnd(1)),vy:-8,alive:true,t:0});
        } else {
          mamekusas.push({x:bx,y:by,vx:dir*(3.5+rnd(2)),vy:-5-rnd(3),alive:true,t:0});
          mamekusas.push({x:bx,y:by,vx:dir*(2+rnd(2)),vy:-3.5-rnd(2),alive:true,t:0});
        }
        // 5回攻撃ごとにダウン
        if(boss.attackCount>=5){
          boss.attackCount=0;
          boss.downTimer=120; // 約2秒（60fps）
          boss.vx=0;
        }
      }
    }

    // 踏み判定：ヨイ全体 vs ボスの上半分（hitFlash中は無効）
    const stompHit = boss.hitFlash===0 && aabb(bird.x,bird.y,bird.w,bird.h, boss.x,boss.y,boss.w,boss.h*0.55);
    // 体当たり判定：ダウン中は無敵
    const bodyHit  = boss.downTimer===0 && aabb(bird.x+6,bird.y+6,bird.w-12,bird.h-12, boss.x+8,boss.y+boss.h*0.45,boss.w-16,boss.h*0.55);
    if(stompHit){
      boss.hp--;boss.hitFlash=18;bird.vy=-11;bird.jumpsLeft=2;scoreBase+=50;
      for(let i=0;i<18;i++) particles.push({x:boss.x+boss.w/2,y:boss.y+20,vx:(rnd01()-.5)*9,vy:rnd01()*-7-1,life:38,max:38,c:['#f5f3ee','#c47a3a','#5ab040','#e8d000'][i%4]});
      if(boss.hp<=0){
        boss.alive=false;state='clear';clearTime=Date.now()-startTime;stopMusic();
        for(let i=0;i<50;i++) particles.push({x:rnd01()*W+worldX,y:rnd01()*H,vx:(rnd01()-.5)*10,vy:rnd01()*-8-2,life:55,max:55,c:['#f5f3ee','#c47a3a','#d42020','#5ab040','#e8d000'][i%5]});
      }
    } else if(bodyHit){die();return;}
  }

  // 豆苗
  for(const m of mamekusas){
    if(!m.alive)continue;
    m.t++;m.x+=m.vx;m.vy+=0.3;m.y+=m.vy;
    if(m.y>GY+10||m.x<worldX-20||m.x>worldX+W+20){m.alive=false;continue;}
    if(aabb(bird.x+6,bird.y+6,bird.w-12,bird.h-10,m.x-9,m.y-9,18,18)){die();return;}
  }
  mamekusas=mamekusas.filter(m=>m.alive);

  // プレイヤー豆苗（ボスヒット・範囲外削除）
  throwCooldown=Math.max(0,throwCooldown-1);
  for(const s of playerShots){
    if(!s.alive)continue;
    s.t++;s.x+=s.vx;s.vy+=0.28;s.y+=s.vy;
    if(s.y>GY+10||s.x<-50||s.x>stageLen()+200){s.alive=false;continue;}
    if(boss&&boss.alive&&aabb(s.x-8,s.y-8,16,16,boss.x+10,boss.y+10,boss.w-20,boss.h-20)){
      s.alive=false;
      boss.hp--;boss.hitFlash=18;scoreBase+=30;
      for(let i=0;i<12;i++) particles.push({x:s.x,y:s.y,vx:(rnd01()-.5)*7,vy:rnd01()*-5-1,life:28,max:28,c:['#5ab040','#e8d000','#f5f3ee'][i%3]});
      if(boss.hp<=0){
        boss.alive=false;state='clear';clearTime=Date.now()-startTime;stopMusic();
        for(let i=0;i<50;i++) particles.push({x:rnd01()*W+worldX,y:rnd01()*H,vx:(rnd01()-.5)*10,vy:rnd01()*-8-2,life:55,max:55,c:['#f5f3ee','#c47a3a','#d42020','#5ab040','#e8d000'][i%5]});
      }
    }
  }
  playerShots=playerShots.filter(s=>s.alive);

  for(const f of floats){f.x+=f.vx;f.y+=f.vy;if(f.y>H+10){f.y=-10;f.x=worldX+rnd01()*W;}}
  particles=particles.filter(p=>p.life>0);
  for(const p of particles){p.x+=p.vx;p.y+=p.vy;p.vy+=0.18;p.life--;}
}

function die(){
  state='dead';clearTime=Date.now()-startTime;stopMusic();
  for(let i=0;i<14;i++) particles.push({x:bird.x+bird.w/2,y:bird.y+bird.h/2,vx:(rnd01()-.5)*8,vy:rnd01()*-7-1,life:32,max:32,c:['#f5f3ee','#c47a3a','#d42020','#a8a6bc'][i%4]});
}

// ===== キャラ描画 =====
function drawBirdSprite(x,y,right,onGround,jumpsLeft){
  const j2=jumpsLeft===0&&!onGround, j1=!onGround&&!j2;
  const lp=Math.floor(frame/10)%2;
  const wa=j2?-0.7:j1?-0.45:-0.1+Math.sin(frame*0.15)*0.12;
  ctx.save();
  ctx.translate(x+bird.w/2,y+bird.h/2);
  if(!right)ctx.scale(-1,1);
  ctx.scale(0.75,0.75);
  // 影
  ctx.fillStyle='rgba(0,0,0,0.22)';
  ctx.beginPath();ctx.ellipse(0,24,16,4,0,0,Math.PI*2);ctx.fill();
  // 尻尾
  ctx.fillStyle='#222';
  ctx.beginPath();ctx.moveTo(-14,0);ctx.lineTo(-28,-4);ctx.lineTo(-26,4);ctx.lineTo(-13,4);ctx.closePath();ctx.fill();
  // 羽
  ctx.save();ctx.translate(-3,0);ctx.rotate(wa);
  ctx.fillStyle='#787068';
  ctx.beginPath();ctx.ellipse(0,0,16,7,0.15,0,Math.PI*2);ctx.fill();
  ctx.restore();
  // 体
  ctx.fillStyle='#888078';
  ctx.beginPath();ctx.moveTo(0,20);ctx.bezierCurveTo(-18,20,-20,2,-18,-10);ctx.bezierCurveTo(-14,-22,14,-22,18,-10);ctx.bezierCurveTo(20,2,18,20,0,20);ctx.closePath();ctx.fill();
  // お腹
  ctx.fillStyle='#e0dcd4';
  ctx.beginPath();ctx.ellipse(2,8,10,13,0.05,0,Math.PI*2);ctx.fill();
  // 頭（少し大きめ）
  ctx.fillStyle='#1a1a1a';
  ctx.beginPath();ctx.arc(2,-19,20,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#5a5060';ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(2,-19,20,0,Math.PI*2);ctx.stroke();
  // ほっぺ
  ctx.fillStyle='#cec8bc';
  ctx.beginPath();ctx.ellipse(13,-15,7,6,0.1,0,Math.PI*2);ctx.fill();
  // 目（白目大きめ・黒目大きめ）
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(14,-25,6,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#111';ctx.beginPath();ctx.arc(14,-25,4.5,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#aa2828';ctx.lineWidth=1.2;
  ctx.beginPath();ctx.arc(14,-25,6,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,0.6)';ctx.beginPath();ctx.arc(16,-27,0.9,0,Math.PI*2);ctx.fill();
  // くちばし
  ctx.fillStyle='#c83828';
  ctx.beginPath();ctx.moveTo(16,-20);ctx.lineTo(30,-16);ctx.lineTo(16,-11);ctx.closePath();ctx.fill();
  ctx.strokeStyle='#9a2818';ctx.lineWidth=1.2;
  ctx.beginPath();ctx.moveTo(16,-15.5);ctx.lineTo(29,-15.5);ctx.stroke();
  // 足
  ctx.strokeStyle='#c04030';ctx.lineWidth=3;ctx.lineCap='round';
  if(j1||j2){
    ctx.beginPath();ctx.moveTo(-4,18);ctx.lineTo(-4,12);ctx.stroke();
    ctx.beginPath();ctx.moveTo(6,18);ctx.lineTo(6,12);ctx.stroke();
  } else {
    ctx.beginPath();ctx.moveTo(-4,18);ctx.lineTo(-4,26+lp*-5);ctx.stroke();
    ctx.beginPath();ctx.moveTo(6,18);ctx.lineTo(6,26+(1-lp)*-5);ctx.stroke();
  }
  if(j2){
    ctx.globalAlpha=0.3+Math.sin(frame*0.6)*0.2;
    ctx.strokeStyle='#d42020';ctx.lineWidth=3;
    ctx.beginPath();ctx.ellipse(0,0,26,32,0,0,Math.PI*2);ctx.stroke();
    ctx.globalAlpha=1;
  }
  ctx.restore();
}

function drawCatSprite(x,y,t,hp=2,flash=0,gold=false,facingLeft=false){
  const body  = gold ? '#c8920a' : '#707088';
  const belly = gold ? '#f0c040' : '#b8b4c8';
  const tail  = gold ? '#a07008' : '#606078';
  const earIn = gold ? '#e8a020' : '#d8a0a8';
  const eyeC  = gold ? '#e84020' : '#d4b000';

  ctx.save();
  ctx.translate(x+22, y+14);
  if(facingLeft) ctx.scale(-1,1);
  if(flash>0) ctx.globalAlpha=0.4+Math.sin(flash*1.8)*0.6;
  if(gold){ ctx.shadowColor='#f0d000'; ctx.shadowBlur=10; }

  const walk = t*0.12;
  const ts = Math.sin(walk)*0.4;

  // しっぽ
  ctx.strokeStyle=tail; ctx.lineWidth=4; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-17,2); ctx.bezierCurveTo(-28,-4,-32,-18+ts*6,-26,-24+ts*8); ctx.stroke();
  ctx.beginPath(); ctx.arc(-26,-24+ts*8,4,0,Math.PI*2); ctx.fillStyle=tail; ctx.fill();

  // 後ろ足
  const r1=Math.sin(walk+Math.PI)*10, r2=Math.sin(walk)*10;
  ctx.strokeStyle=body; ctx.lineWidth=5; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-10,8); ctx.lineTo(-12+r1*0.4,14); ctx.lineTo(-10+r1*0.3,22); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-6,8); ctx.lineTo(-4+r2*0.4,14); ctx.lineTo(-6+r2*0.3,22); ctx.stroke();

  // 胴体
  ctx.fillStyle=body; ctx.beginPath(); ctx.ellipse(0,4,18,11,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=belly; ctx.beginPath(); ctx.ellipse(2,7,10,6,0,0,Math.PI*2); ctx.fill();

  // 前足
  const f1=Math.sin(walk)*10, f2=Math.sin(walk+Math.PI)*10;
  ctx.strokeStyle=body; ctx.lineWidth=5; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(10,4); ctx.lineTo(12+f1*0.4,12); ctx.lineTo(10+f1*0.3,22); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(14,4); ctx.lineTo(16+f2*0.4,12); ctx.lineTo(14+f2*0.3,22); ctx.stroke();

  // 頭
  ctx.fillStyle=body; ctx.beginPath(); ctx.arc(20,-2,11,0,Math.PI*2); ctx.fill();

  // 耳
  [[14,-10,11,-20,18,-10],[22,-10,20,-20,27,-10]].forEach(([x1,y1,x2,y2,x3,y3])=>{
    ctx.fillStyle=body; ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.lineTo(x3,y3); ctx.closePath(); ctx.fill();
    ctx.fillStyle=earIn; ctx.beginPath(); ctx.moveTo(x1+1,y1-1); ctx.lineTo(x2+1,y2+3); ctx.lineTo(x3-1,y3-1); ctx.closePath(); ctx.fill();
  });

  // 目
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(24,-4,3.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=eyeC;   ctx.beginPath(); ctx.arc(24,-4,2,  0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(24,-4,0.9,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(25,-5,0.8,0,Math.PI*2); ctx.fill();

  // 鼻・ひげ
  ctx.fillStyle='#d08090'; ctx.beginPath(); ctx.arc(28,-2,1.8,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle=gold?'#e8d080':'#bbb'; ctx.lineWidth=1;
  [[18,-1,8,0],[18,-2,8,-3],[18,-3,9,-6]].forEach(([x1,y1,x2,y2])=>{
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  });

  ctx.shadowBlur=0; ctx.shadowColor='transparent';
  ctx.fillStyle='rgba(0,0,0,0.10)'; ctx.beginPath(); ctx.ellipse(4,24,18,4,0,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawSnakeSprite(x,y,t,hp=3,flash=0,gold=false,facingRight=false){
  const bodyC  = gold ? '#c8920a' : '#3a8828';
  const stripeC= gold ? '#f0d040' : '#5ab040';
  const headC  = gold ? '#a07008' : '#2a6820';
  const eyeC   = gold ? '#d42020' : '#d4c000';
  const segs=7, sw=14, totalW=segs*sw+20;
  ctx.save();
  if(facingRight){
    ctx.translate(x,y+16);
  } else {
    ctx.translate(x+totalW,y+16); ctx.scale(-1,1);
  }
  if(flash>0) ctx.globalAlpha=0.4+Math.sin(flash*1.8)*0.6;
  if(gold){ ctx.shadowColor='#f0d000'; ctx.shadowBlur=10; }

  // 影
  ctx.strokeStyle='rgba(0,0,0,0.12)'; ctx.lineWidth=10; ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.beginPath();
  for(let i=0;i<=segs;i++){const sx=i*sw,sy=Math.sin(t*0.1+i*0.9)*6+3; i===0?ctx.moveTo(sx,sy):ctx.lineTo(sx,sy);}
  ctx.stroke();

  // 体
  ctx.strokeStyle=bodyC; ctx.lineWidth=12;
  ctx.beginPath();
  for(let i=0;i<=segs;i++){const sx=i*sw,sy=Math.sin(t*0.1+i*0.9)*6; i===0?ctx.moveTo(sx,sy):ctx.lineTo(sx,sy);}
  ctx.stroke();
  ctx.strokeStyle=stripeC; ctx.lineWidth=5;
  ctx.beginPath();
  for(let i=0;i<=segs;i++){const sx=i*sw,sy=Math.sin(t*0.1+i*0.9)*6; i===0?ctx.moveTo(sx,sy):ctx.lineTo(sx,sy);}
  ctx.stroke();

  const hx=segs*sw, hy=Math.sin(t*0.1+segs*0.9)*6;
  ctx.shadowBlur=0; ctx.shadowColor='transparent';
  ctx.fillStyle=headC; ctx.beginPath(); ctx.ellipse(hx+8,hy,10,8,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(hx+12,hy-3,3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=eyeC;  ctx.beginPath(); ctx.arc(hx+12,hy-3,2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#111';ctx.beginPath(); ctx.arc(hx+12,hy-3,1,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath(); ctx.arc(hx+13,hy-4,0.7,0,Math.PI*2); ctx.fill();
  // 舌
  ctx.strokeStyle='#d42020'; ctx.lineWidth=1.5; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(hx+18,hy); ctx.lineTo(hx+23,hy-3); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(hx+18,hy); ctx.lineTo(hx+23,hy+3); ctx.stroke();
  ctx.restore();
}

// ===== ラスボス（巨大白文鳥・ルカ）=====
function drawBoss(b){
  if(!b.alive)return;
  const bob=Math.sin(b.t*0.05)*5;
  const sc=2.8;
  const flash=b.hitFlash>0;
  const lp=Math.floor(frame/14)%2;
  const bframe=b.t;

  // --- キャラ本体（scaleあり）---
  ctx.save();
  ctx.translate(b.x+b.w/2, b.y+b.h/2+bob);
  ctx.scale(-sc,sc);
  if(flash) ctx.globalAlpha=0.45+Math.sin(b.hitFlash*1.6)*0.55;

  // 影
  ctx.fillStyle='rgba(0,0,0,0.25)';
  ctx.beginPath();ctx.ellipse(0,28,16,5,0,0,Math.PI*2);ctx.fill();

  // 尾羽（白）
  ctx.fillStyle='#e8e4dc';
  ctx.beginPath();ctx.moveTo(-13,4);ctx.lineTo(-24,0);ctx.lineTo(-24,10);ctx.lineTo(-13,10);ctx.closePath();ctx.fill();
  ctx.strokeStyle='#ccc';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(-13,4);ctx.lineTo(-24,0);ctx.lineTo(-24,10);ctx.lineTo(-13,10);ctx.closePath();ctx.stroke();

  // 羽（白）
  const wa=Math.sin(bframe*0.1)*0.18;
  ctx.fillStyle='#e0dcd4';
  ctx.save();ctx.translate(-4,4);ctx.rotate(wa-0.1);
  ctx.beginPath();ctx.ellipse(0,0,13,6,0.2,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#bbb';ctx.lineWidth=1.8;ctx.beginPath();ctx.ellipse(0,0,13,6,0.2,0,Math.PI*2);ctx.stroke();
  ctx.restore();

  // 体（純白・ぽってり）
  ctx.fillStyle='#f2eee6';
  ctx.beginPath();
  ctx.moveTo(0,18);ctx.bezierCurveTo(-20,18,-22,0,-20,-10);
  ctx.bezierCurveTo(-16,-22,16,-22,20,-10);ctx.bezierCurveTo(22,0,20,18,0,18);
  ctx.closePath();ctx.fill();
  ctx.strokeStyle='#ccc';ctx.lineWidth=1.5;
  ctx.beginPath();
  ctx.moveTo(0,18);ctx.bezierCurveTo(-20,18,-22,0,-20,-10);
  ctx.bezierCurveTo(-16,-22,16,-22,20,-10);ctx.bezierCurveTo(22,0,20,18,0,18);
  ctx.closePath();ctx.stroke();

  // お腹（白）
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.ellipse(2,6,11,14,0.05,0,Math.PI*2);ctx.fill();

  // 頭（白・大きめ）
  ctx.fillStyle='#f2eee6';
  ctx.beginPath();ctx.arc(2,-18,18,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#ccc';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.arc(2,-18,18,0,Math.PI*2);ctx.stroke();

  // ほっぺ（控えめピンク）
  ctx.fillStyle='#e0bcb8';
  ctx.beginPath();ctx.ellipse(12,-14,7,6,0.1,0,Math.PI*2);ctx.fill();

  // 目（ダウン中は閉じる）
  if(b.downTimer>0){
    // 閉じた目（横線）
    ctx.strokeStyle='#888';ctx.lineWidth=2;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(9,-23);ctx.lineTo(17,-23);ctx.stroke();
    // 眉（ゆるゆる）
    ctx.strokeStyle='#aaa';ctx.lineWidth=1.2;
    ctx.beginPath();ctx.moveTo(8,-29);ctx.quadraticCurveTo(13,-31,18,-29);ctx.stroke();
  } else {
    // 目（赤アイリング）
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(13,-23,4.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#d42020';ctx.beginPath();ctx.arc(13,-23,2.8,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#111';ctx.beginPath();ctx.arc(13,-23,1.2,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#aa2020';ctx.lineWidth=1.2;
    ctx.beginPath();ctx.arc(13,-23,4.5,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(14,-24,1,0,Math.PI*2);ctx.fill();
    // 怒り眉
    ctx.strokeStyle='#555';ctx.lineWidth=1.4;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(7,-29);ctx.lineTo(16,-27);ctx.stroke();
  }

  // くちばし（ピンク・大きめ）
  ctx.fillStyle='#d05878';
  ctx.beginPath();ctx.moveTo(17,-19);ctx.lineTo(30,-15);ctx.lineTo(17,-10);ctx.closePath();ctx.fill();
  ctx.strokeStyle='#a04060';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(17,-14.5);ctx.lineTo(29,-14.5);ctx.stroke();

  // 足
  ctx.strokeStyle='#d080a0';ctx.lineWidth=3;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(-2,18);ctx.lineTo(-2,26+lp*-4);ctx.stroke();
  ctx.beginPath();ctx.moveTo(6,18);ctx.lineTo(6,26+(1-lp)*-4);ctx.stroke();

  // HPゲージ（キャラ本体のscaleを戻してから描く）
  ctx.restore(); // キャラ本体のsave とペア

  // --- HPゲージ（scaleなし）---
  ctx.save();
  ctx.globalAlpha=1;
  ctx.translate(b.x+b.w/2, b.y+b.h/2+bob);
  const bw=120,bh=12,bx2=-60,by2=-115;
  ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(bx2-2,by2-2,bw+4,bh+4);
  const hr=b.hp/b.maxHp;
  ctx.fillStyle=hr>0.5?'#5ab040':hr>0.25?'#e8a000':'#d42020';
  ctx.fillRect(bx2,by2,bw*hr,bh);
  ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.strokeRect(bx2,by2,bw,bh);
  ctx.fillStyle='#fff';ctx.font='bold 9px sans-serif';ctx.textAlign='center';
  ctx.fillText('👑 ルカ   HP:'+b.hp+'/'+b.maxHp, bx2+bw/2, by2-5);
  ctx.restore(); // HPゲージのsave とペア

  // ダウン中のZzz表示
  if(b.downTimer>0){
    ctx.save();
    ctx.font='bold 18px sans-serif';
    ctx.textAlign='left';
    const zx=b.x+b.w+8;
    const zy=b.y+20;
    const alpha=0.5+Math.sin(b.t*0.15)*0.5;
    ctx.globalAlpha=alpha;
    ctx.fillStyle='#aaddff';
    ctx.fillText('z',zx,zy);
    ctx.font='bold 22px sans-serif';
    ctx.globalAlpha=alpha*0.7;
    ctx.fillText('z',zx+12,zy-12);
    ctx.font='bold 28px sans-serif';
    ctx.globalAlpha=alpha*0.5;
    ctx.fillText('Z',zx+26,zy-26);
    ctx.globalAlpha=1;
    ctx.restore();
  }
}

function drawCrowSprite(x,y,t,flash=0,diveMode=false,facingLeft=false,gold=false){
  const flap=Math.sin(t*0.25)*0.6;
  ctx.save();
  ctx.translate(x+18,y+16);
  if(facingLeft) ctx.scale(-1,1);
  ctx.scale(1.3,1.3);
  if(flash>0) ctx.globalAlpha=0.4+Math.sin(flash*1.8)*0.6;
  if(diveMode) ctx.rotate(facingLeft?-0.4:0.4);
  if(gold){ ctx.shadowColor='#f0d000'; ctx.shadowBlur=12; }

  const bodyC  = gold?'#b87800':'#4a5068';
  const wingC  = gold?'#d49000':'#5a6080';
  const wingC2 = gold?'#c08000':'#404860';
  const headC  = gold?'#a06800':'#383d55';
  const beakC  = gold?'#c09020':'#8090a8';
  const eyeC   = gold?'#ff2020':'#ff4444';
  const eyeC2  = gold?'#ff6060':'#ff7070';
  // 影
  ctx.fillStyle='rgba(0,0,0,0.18)';
  ctx.beginPath();ctx.ellipse(0,18,14,4,0,0,Math.PI*2);ctx.fill();

  // 左羽（後ろ）
  ctx.save();ctx.rotate(-0.3+flap);
  ctx.fillStyle=wingC2;
  ctx.beginPath();ctx.moveTo(-4,0);ctx.bezierCurveTo(-18,-8,-22,-2,-14,6);ctx.closePath();ctx.fill();
  ctx.strokeStyle=gold?'#c09020':'#2a2a38';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(-4,0);ctx.bezierCurveTo(-18,-8,-22,-2,-14,6);ctx.closePath();ctx.stroke();
  ctx.restore();

  // 右羽（前）
  ctx.save();ctx.rotate(0.3-flap);
  ctx.fillStyle=wingC;
  ctx.beginPath();ctx.moveTo(4,0);ctx.bezierCurveTo(18,-8,22,-2,14,6);ctx.closePath();ctx.fill();
  ctx.strokeStyle=gold?'#c09020':'#2a2a38';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(4,0);ctx.bezierCurveTo(18,-8,22,-2,14,6);ctx.closePath();ctx.stroke();
  ctx.restore();

  // 体
  ctx.fillStyle=bodyC;
  ctx.beginPath();ctx.ellipse(0,4,9,13,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle=gold?'#c09020':'#2a2a38';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.ellipse(0,4,9,13,0,0,Math.PI*2);ctx.stroke();

  // 頭
  ctx.fillStyle=headC;
  ctx.beginPath();ctx.arc(0,-8,8,0,Math.PI*2);ctx.fill();

  // 目（鋭い赤）
  ctx.fillStyle=eyeC;
  ctx.beginPath();ctx.arc(5,-9,2.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=eyeC2;
  ctx.beginPath();ctx.arc(5.5,-9.5,1,0,Math.PI*2);ctx.fill();

  // くちばし（自然なサイズ）
  ctx.fillStyle=beakC;
  ctx.beginPath();ctx.moveTo(6,-10);ctx.lineTo(16,-8);ctx.lineTo(6,-5);ctx.closePath();ctx.fill();
  ctx.strokeStyle=gold?'#a08020':'#606878';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(6,-7.5);ctx.lineTo(15,-7.5);ctx.stroke();

  // 尾羽
  ctx.fillStyle=headC;
  ctx.beginPath();ctx.moveTo(-4,14);ctx.lineTo(-8,22);ctx.lineTo(0,20);ctx.lineTo(8,22);ctx.lineTo(4,14);ctx.closePath();ctx.fill();

  // 足
  ctx.strokeStyle=beakC;ctx.lineWidth=2;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(-3,16);ctx.lineTo(-3,22);ctx.lineTo(-7,26);ctx.stroke();
  ctx.beginPath();ctx.moveTo(-3,22);ctx.lineTo(1,26);ctx.stroke();
  ctx.beginPath();ctx.moveTo(3,16);ctx.lineTo(3,22);ctx.lineTo(-1,26);ctx.stroke();
  ctx.beginPath();ctx.moveTo(3,22);ctx.lineTo(7,26);ctx.stroke();

  ctx.shadowBlur=0;ctx.shadowColor='transparent';
  ctx.restore();
}

function drawMamekusa(m){
  ctx.save();ctx.translate(m.x,m.y);ctx.rotate(m.t*0.15);
  ctx.strokeStyle='#3a8828';ctx.lineWidth=2.5;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(0,7);ctx.lineTo(0,-7);ctx.stroke();
  ctx.fillStyle='#5ab040';
  ctx.beginPath();ctx.ellipse(-7,0,8,4,0.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(7,0,8,4,-0.5,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#2a6820';ctx.lineWidth=1;
  ctx.beginPath();ctx.ellipse(-7,0,8,4,0.5,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.ellipse(7,0,8,4,-0.5,0,Math.PI*2);ctx.stroke();
  ctx.restore();
}

// ===== 描画メイン =====
function draw(){
  ctx.clearRect(0,0,W,H);

  // 背景グラデーション（ステージ別）
  const bg=ctx.createLinearGradient(0,0,0,H);
  if(stage===1){bg.addColorStop(0,'#1a1e24');bg.addColorStop(1,'#252b32');}
  else if(stage===2){bg.addColorStop(0,'#1a1824');bg.addColorStop(1,'#201830');}
  else{bg.addColorStop(0,'#1a1410');bg.addColorStop(1,'#201814');}
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  // 遠景木（可視範囲のみ）
  ctx.save();ctx.translate(-worldX*0.22,0);
  const treeVx1=worldX*0.22-50, treeVx2=worldX*0.22+W+50;
  for(let tx=40;tx<stageLen()*1.25;tx+=160){
    if(tx+60<treeVx1||tx>treeVx2) continue;
    ctx.fillStyle='#28200e';ctx.fillRect(tx+15,GY-95,6,95);
    ctx.fillStyle='rgba(180,110,40,0.13)';
    ctx.beginPath();ctx.arc(tx+18,GY-104,32,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();

  // 浮遊粒子
  ctx.save();ctx.translate(-worldX,0);
  for(const f of floats){
    ctx.globalAlpha=f.alpha;
    ctx.fillStyle=f.alpha>0.38?'#f5f3ee':'#9a9fa8';
    ctx.beginPath();ctx.arc(f.x,f.y,f.r,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;ctx.restore();

  ctx.save();ctx.translate(-worldX,0);

  // 地面・足場（画面内のみ描画）
  const vx1=worldX-10, vx2=worldX+W+10; // 可視範囲
  for(const p of platforms){
    if(p.x+p.w<vx1||p.x>vx2) continue; // 画面外スキップ
    if(p.h===44){
      ctx.fillStyle='#32383e';ctx.fillRect(p.x,p.y,p.w,p.h);
      ctx.fillStyle='#8a9098';ctx.fillRect(p.x,p.y,p.w,4);
      ctx.fillStyle='rgba(0,0,0,0.15)';
      const txStart=Math.max(p.x, Math.floor(vx1/16)*16);
      const txEnd=Math.min(p.x+p.w, vx2);
      for(let tx=txStart;tx<txEnd;tx+=16)ctx.fillRect(tx,p.y,1,p.h);
    } else {
      const[sc,sl]=stage===1?['#b86e30','#d88e50']:stage===2?['#4870b0','#6898d8']:['#7840a0','#a060c8'];
      ctx.fillStyle=sc;
      ctx.beginPath();ctx.roundRect(p.x,p.y,p.w,p.h,3);ctx.fill();
      ctx.fillStyle=sl;ctx.fillRect(p.x+4,p.y+2,p.w-8,4);
    }
  }

  // 敵（画面内のみ描画）
  for(const e of enemies){
    if(!e.alive)continue;
    if(e.x+140<vx1||e.x>vx2) continue;
    if(e.type==='cat')drawCatSprite(e.x,e.y,e.t,e.hp,e.hitFlash||0,e.gold||false,e.vx<0);
    else if(e.type==='crow')drawCrowSprite(e.x,e.y,e.t,e.hitFlash||0,e.diveMode||false,e.facingLeft||false,e.gold||false);
    else drawSnakeSprite(e.x,e.y,e.t,e.hp,e.hitFlash||0,e.gold||false,e.vx>0);
    if(e.hitFlash>0)e.hitFlash--;
  }

  // ボス
  if(boss&&boss.alive)drawBoss(boss);

  // 豆苗（ボス発射）
  for(const m of mamekusas)drawMamekusa(m);

  // 豆苗（プレイヤー発射）- 緑光で差別化
  for(const s of playerShots){
    ctx.save();ctx.translate(s.x,s.y);ctx.rotate(s.t*0.22);
    // 光るオーラ
    ctx.shadowColor='#7aff40';ctx.shadowBlur=8;
    ctx.strokeStyle='#3a8828';ctx.lineWidth=2.5;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(0,7);ctx.lineTo(0,-7);ctx.stroke();
    ctx.fillStyle='#7aff40';
    ctx.beginPath();ctx.ellipse(-7,0,8,4,0.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(7,0,8,4,-0.5,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#2a8020';ctx.lineWidth=1;
    ctx.beginPath();ctx.ellipse(-7,0,8,4,0.5,0,Math.PI*2);ctx.stroke();
    ctx.beginPath();ctx.ellipse(7,0,8,4,-0.5,0,Math.PI*2);ctx.stroke();
    ctx.shadowBlur=0;ctx.shadowColor='transparent';
    ctx.restore();
  }

  // プレイヤー
  drawBirdSprite(bird.x,bird.y,bird.facingRight,bird.onGround,bird.jumpsLeft);

  ctx.restore();

  // パーティクル
  ctx.save();ctx.translate(-worldX,0);
  for(const p of particles){
    ctx.globalAlpha=p.life/p.max;
    ctx.fillStyle=p.c;
    ctx.fillRect(p.x-2,p.y-2,4,4);
  }
  ctx.globalAlpha=1;ctx.restore();

  // 溜めゲージ（charging中のみ表示）
  if(charging&&state==='play'){
    const power=Math.min(frame-chargeStart,MAX_CHARGE)/MAX_CHARGE;
    const gw=50, gh=7;
    const gx=bird.x-worldX+bird.w/2-gw/2;
    const gy=bird.y-20;
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(gx-1,gy-1,gw+2,gh+2);
    const col=power<0.5?`#7aff40`:`#ffdd00`;
    ctx.fillStyle=col;ctx.fillRect(gx,gy,gw*power,gh);
    ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.strokeRect(gx,gy,gw,gh);
  }

  // オーバーレイ
  if(state==='start'){
    ctx.fillStyle='rgba(18,20,24,0.93)';ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';
    // タイトル「ブンチョウ」— 白・ゆったり間隔
    ctx.font='600 1.15rem "Noto Sans JP",sans-serif';
    ctx.letterSpacing='0.28em';
    ctx.fillStyle='#f5f3ee';
    ctx.fillText('ブンチョウ',W/2,H/2-88);
    ctx.letterSpacing='0';
    // 「ヨイの試練」— 大きく白
    ctx.fillStyle='#f5f3ee';ctx.font='bold 2.4rem "Noto Sans JP",sans-serif';
    ctx.fillText('ヨイの試練',W/2,H/2-48);
    // created by btk
    ctx.fillStyle='#6a7080';ctx.font='0.7rem "Noto Sans JP",sans-serif';
    ctx.fillText('created by btk',W/2,H/2-18);
    ctx.fillStyle='#9a9fa8';ctx.font='0.85rem "Noto Sans JP",sans-serif';
    ctx.fillText('← → 移動　▲ ジャンプ',W/2,H/2+10);
    ctx.fillStyle='#5ab040';ctx.font='0.85rem "Noto Sans JP",sans-serif';
    ctx.fillText('🌱 ボタンで豆苗を投げる（Zキーも可）',W/2,H/2+32);
    ctx.fillStyle='#d42020';ctx.font='bold 1.1rem "Noto Sans JP",sans-serif';
    ctx.fillText('タップ / スペースでスタート',W/2,H/2+66);
  }
  if(state==='dead'||state==='clear'){
    // 称号ロジック
    function getTitle(){
      if(state==='clear'){
        const sec=clearTime/1000;
        if(score>=1800&&sec<120) return {t:'🏆 伝説のブン',m:'神速かつ高得点！まさに伝説！',c:'#e8d000'};
        if(score>=1800)          return {t:'👑 文鳥神ヨイ',m:'1800点超え…もはや神の領域！',c:'#e8a000'};
        if(score>=1600&&sec<120) return {t:'⚡ 必殺仕事ブン',m:'速い！そして強い！必殺の一撃！',c:'#e8d000'};
        if(score>=1500)          return {t:'💪 覇権ブン',m:'1500点超え！完全制覇！',c:'#d06020'};
        if(score>=1400&&sec<120) return {t:'🦅 ハヤブサのブン',m:'スピードと実力を兼ね備えた猛者！',c:'#e8d000'};
        if(score>=1200)          return {t:'🌟 文鳥界のブン',m:'素晴らしいプレイ！文鳥界の頂点へ！',c:'#5ab040'};
        if(score>=1000)          return {t:'🌱 豆苗の使い手',m:'ナイスクリア！豆苗を極めた！',c:'#5ab040'};
        return {t:'🐦 誇らしげなブン',m:'クリアおめでとう！胸を張れ！',c:'#c47a3a'};
      } else {
        if(stage===3) return {t:'😇 もう少し！',m:'ステージ3まで到達！あと一歩！',c:'#c47a3a'};
        if(stage===2) return {t:'🐦 修行中',m:'ステージ2到達！まだまだこれから！',c:'#6888c8'};
        return {t:'🥚 ひよっこ',m:'ステージ1で散った…練習あるのみ！',c:'#9a9fa8'};
      }
    }
    const title=getTitle();
    const elapsed=clearTime;
    const sec=Math.floor(elapsed/1000);
    const timeStr=Math.floor(sec/60)+':'+(sec%60<10?'0':'')+sec%60;

    // 背景
    ctx.fillStyle='rgba(12,14,20,0.96)';ctx.fillRect(0,0,W,H);

    const isClr=state==='clear';
    const top=20;

    // タイトル帯
    ctx.fillStyle=isClr?'rgba(40,60,20,0.8)':'rgba(60,20,20,0.8)';
    ctx.fillRect(0,top,W,50);
    ctx.fillStyle=isClr?'#e8d000':'#d42020';
    ctx.font='bold 1.8rem "Noto Sans JP",sans-serif';
    ctx.textAlign='center';
    ctx.fillText(isClr?'🎉 クリア！':'ゲームオーバー',W/2,top+36);

    // 称号
    ctx.fillStyle=title.c;
    ctx.font='bold 1.1rem "Noto Sans JP",sans-serif';
    ctx.fillText(title.t,W/2,top+84);
    ctx.fillStyle='#b0b8c0';
    ctx.font='0.75rem "Noto Sans JP",sans-serif';
    ctx.fillText(title.m,W/2,top+104);

    // 区切り線
    ctx.strokeStyle='rgba(255,255,255,0.12)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(W*0.1,top+116);ctx.lineTo(W*0.9,top+116);ctx.stroke();
    // スタッツ（1列横並び）
    const stats=[
      ['SCORE', score],
      ['TIME', timeStr],
      ['STAGE', stage+' / 3'],
      ['BEST', hiScore],
    ];
    stats.forEach(([label,val],i)=>{
      const col = W * (i+0.5) / 4;
      const row = top+140;
      ctx.fillStyle='#6a7888';
      ctx.font='0.6rem "Noto Sans JP",sans-serif';
      ctx.textAlign='center';
      ctx.fillText(label, col, row);
      ctx.fillStyle='#f0ece4';
      ctx.font='bold 1.2rem "Noto Sans JP",sans-serif';
      ctx.fillText(val, col, row+26);
    });

    // HTMLボタンを表示
    showResultBtns(isClr);
  }else{
    hideResultBtns();
  }
}

function loop(){update();draw();requestAnimationFrame(loop);}

function openXShare(){
  const sec=Math.floor(clearTime/1000);
  const timeStr=Math.floor(sec/60)+':'+(sec%60<10?'0':'')+sec%60;
  const isClr=state==='clear';
  // 称号
  let t='🐦 誇らしげなブン';
  if(isClr){
    if(score>=1800&&sec<120) t='🏆 伝説のブン';
    else if(score>=1800) t='👑 文鳥神ヨイ';
    else if(score>=1600&&sec<120) t='⚡ 必殺仕事ブン';
    else if(score>=1500) t='💪 覇権ブン';
    else if(score>=1400&&sec<120) t='🦅 ハヤブサのブン';
    else if(score>=1200) t='🌟 文鳥界のブン';
    else if(score>=1000) t='🌱 豆苗の使い手';
  } else {
    if(stage===3) t='😇 もう少し！';
    else if(stage===2) t='🐦 修行中';
    else t='🥚 ひよっこ';
  }
  const hashtags=`#ヨイの試練 #buncho #game\n#文鳥 #豆苗`;
  const url='https://btktune.github.io/buncho-game/buncho/';
  const text=isClr
    ? `ブンチョウ ヨイの試練 🌱\n称号：${t}\nSCORE: ${score} / TIME: ${timeStr}\n${url}\n\n${hashtags}`
    : `ブンチョウ ヨイの試練 🌱\n称号：${t} / STAGE: ${stage}/3\nSCORE: ${score} / TIME: ${timeStr}\n${url}\n\n${hashtags}`;
  window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`,'_blank');
}

resetGame();
loop();
</script>
